<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Socket</title>
</head>
<body>
    <div id="checkbox-container">
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
    const socket = io();
    const checkboxes = new Array(100).fill(false);
    const checkboxContainer = document.getElementById("checkbox-container");
    checkboxes.forEach((checkbox,i)=>{
      const check = document.createElement("input");
      check.setAttribute("type","checkbox");
      check.id = `index-${i}`;
      check.addEventListener("change",(e)=>
        socket.emit("checkbox-update",{index:i,value: check.checked}));
      checkboxContainer.appendChild(check);
    })
    stateUpdate();
    async function stateUpdate(){
      const res = await fetch('/state',{
        headers: {
          'Content-Type':'application/json'
        }
      })
      const _json = await res.json();
      if(_json.state){ 
        _json.state.forEach((e,index)=>{
          const element = document.getElementById(`index-${index}`);
          element.checked = e; 
        })
      }
    }
    socket.on("checkbox-update",({index,value})=>{
      stateUpdate();
    }
    )
    </script>
</body>
</html>
